services:
  kafka:
    image: redpandadata/redpanda:v23.3.20
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  redpanda-setup:
    image: redpandadata/redpanda:v23.3.20
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "bash", "-c" ]
    command:
      - |
        rpk topic create test --brokers kafka:9092

  redpanda-console:
    image: redpandadata/console:latest
    ports:
      - "9000:8080"
    environment:
      KAFKA_BROKERS: kafka:9092

  postgres:
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: pwd
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
